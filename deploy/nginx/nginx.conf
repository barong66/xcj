# ============================================
# Traforama Video Aggregator — Nginx Configuration
# Production reverse proxy (HTTPS terminated at Cloudflare)
# ============================================

user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ── Basic Settings ────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Client Limits ─────────────────────────────────────────────
    client_max_body_size 1m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    # ── Keepalive ─────────────────────────────────────────────────
    keepalive_timeout 65;
    keepalive_requests 1000;

    # ── Real IP from Cloudflare ───────────────────────────────────
    # Uncomment after Cloudflare setup:
    #   sudo cp /opt/traforama/xcj/deploy/nginx/cloudflare-ips.conf /etc/nginx/
    # include /etc/nginx/cloudflare-ips.conf;
    # real_ip_header CF-Connecting-IP;
    # real_ip_recursive on;

    # ── Gzip Compression ─────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml;

    # ── Logging ──────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time '
                    'cf_ray=$http_cf_ray';

    access_log /var/log/nginx/access.log main;

    # ── Rate Limiting Zones ──────────────────────────────────────
    # General API: 100 req/sec with burst of 200
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;

    # Events endpoint: 500 req/sec (every page view sends events)
    limit_req_zone $binary_remote_addr zone=events:10m rate=500r/s;

    # Return 429 instead of 503 when rate limited
    limit_req_status 429;

    # ── Upstream Backends ────────────────────────────────────────
    upstream api_backend {
        server 127.0.0.1:8080;
        keepalive 32;
    }

    upstream web_backend {
        server 127.0.0.1:3000;
        keepalive 16;
    }

    # ── Server Block ─────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Security Headers ─────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── Health Check (nginx-level) ───────────────────────────
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ── API: Events Endpoint (higher rate limit) ─────────────
        location ~ ^/api/v1/events(/|$) {
            limit_req zone=events burst=1000 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header X-Request-ID $request_id;

            # Events are small POST payloads — minimal buffering
            proxy_buffering off;
            proxy_request_buffering off;

            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }

        # ── API: All Other Endpoints ─────────────────────────────
        location /api/ {
            limit_req zone=api burst=200 nodelay;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header X-Request-ID $request_id;

            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 8 16k;
            proxy_busy_buffers_size 32k;

            proxy_connect_timeout 5s;
            proxy_send_timeout 15s;
            proxy_read_timeout 15s;
        }

        # ── API: Health Check Passthrough ────────────────────────
        location = /health {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # ── Static Media: Thumbnails ─────────────────────────────
        location /thumbnails/ {
            # Served from CDN/R2, but if proxied through origin:
            proxy_pass http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;

            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            access_log off;
        }

        # ── Static Media: Previews ───────────────────────────────
        location /previews/ {
            proxy_pass http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;

            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            access_log off;
        }

        # ── Next.js Static Assets ────────────────────────────────
        location /_next/static/ {
            proxy_pass http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;

            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            access_log off;
        }

        # ── Sitemap ──────────────────────────────────────────────
        location = /sitemap.xml {
            proxy_pass http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            expires 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        location = /robots.txt {
            proxy_pass http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;

            expires 1d;
            add_header Cache-Control "public, max-age=86400";
            access_log off;
        }

        # ── Next.js SSR (everything else) ────────────────────────
        location / {
            proxy_pass http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header X-Request-ID $request_id;

            # SSR responses can be large — buffer them
            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 8 32k;
            proxy_busy_buffers_size 64k;

            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ── Block Hidden Files ───────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
