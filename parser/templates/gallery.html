<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Banner Templates Gallery</title>
<style>
  body {
    background: #1a1a1a;
    color: #fff;
    font-family: -apple-system, sans-serif;
    padding: 40px;
    display: flex;
    flex-wrap: wrap;
    gap: 40px;
    justify-content: center;
  }
  .template {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .template h2 {
    font-size: 14px;
    font-weight: 500;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  iframe {
    border: none;
    width: 300px;
    height: 250px;
  }
</style>
</head>
<body>
  <div class="template">
    <h2>Minimalist</h2>
    <iframe src="banner_minimalist.html"></iframe>
  </div>
  <div class="template">
    <h2>Bold</h2>
    <iframe src="banner_bold.html"></iframe>
  </div>
  <div class="template">
    <h2>Elegant</h2>
    <iframe src="banner_elegant.html"></iframe>
  </div>
  <div class="template">
    <h2>Card</h2>
    <iframe src="banner_card.html"></iframe>
  </div>
</body>
</html>
