<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Banner — Bold</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

  .banner {
    width: 300px;
    height: 250px;
    position: relative;
    overflow: hidden;
    font-family: 'Montserrat', 'Arial Black', sans-serif;
    cursor: pointer;
    border: 3px solid #FF2D7B;
    box-shadow: 0 0 20px rgba(255,45,123,0.4), 0 0 60px rgba(255,45,123,0.15);
  }

  .banner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 20%;
    display: block;
  }

  /* Dark overlay */
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 1;
  }

  /* Bottom gradient */
  .banner::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 55%;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 50%, transparent 100%);
    z-index: 1;
  }

  /* Diagonal accent corner */
  .corner-accent {
    position: absolute;
    top: -30px;
    right: -30px;
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, transparent 50%, rgba(255,45,123,0.3) 50%);
    z-index: 2;
  }

  .content {
    position: absolute;
    inset: 0;
    z-index: 3;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 14px;
  }

  .username {
    color: #fff;
    font-size: 15px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-shadow: 0 0 15px rgba(255,45,123,0.6), 0 2px 4px rgba(0,0,0,0.5);
  }

  .bottom {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .tagline {
    color: rgba(255,255,255,0.7);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .cta-btn {
    display: inline-block;
    padding: 10px 32px;
    background: linear-gradient(135deg, #FF2D7B 0%, #FF6B35 100%);
    color: #fff;
    font-size: 13px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    border-radius: 25px;
    text-decoration: none;
    box-shadow: 0 0 25px rgba(255,45,123,0.5), 0 4px 15px rgba(0,0,0,0.3);
    transition: box-shadow 0.2s, transform 0.2s;
  }

  .banner:hover .cta-btn {
    box-shadow: 0 0 35px rgba(255,45,123,0.7), 0 4px 20px rgba(0,0,0,0.4);
    transform: scale(1.03);
  }
</style>
</head>
<body>

<div class="banner">
  <img src="https://media.temptguide.com/thumbnails/instagram/3666606405366080846_lg.jpg" alt="">
  <div class="corner-accent"></div>
  <div class="content">
    <span class="username">@sofi.sun.s</span>
    <div class="bottom">
      <span class="tagline">Exclusive Content</span>
      <span class="cta-btn">Watch Now</span>
    </div>
  </div>
</div>

</body>
</html>
