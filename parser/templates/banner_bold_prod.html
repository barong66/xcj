<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; overflow: hidden;
    width: {{WIDTH}}px; height: {{HEIGHT}}px;
  }

  .banner {
    position: absolute;
    top: 0; left: 0;
    width: {{WIDTH}}px;
    height: {{HEIGHT}}px;
    overflow: hidden;
    font-family: 'Montserrat', 'Arial Black', sans-serif;
  }

  .banner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 20%;
    display: block;
  }

  /* Dark overlay */
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 1;
  }

  /* Bottom gradient */
  .banner::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 55%;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 50%, transparent 100%);
    z-index: 1;
  }

  /* Pink border (inset so it doesn't affect layout) */
  .border-overlay {
    position: absolute;
    inset: 0;
    border: 3px solid #FF2D7B;
    z-index: 4;
    pointer-events: none;
  }

  /* Diagonal accent corner */
  .corner-accent {
    position: absolute;
    top: -30px;
    right: -30px;
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, transparent 50%, rgba(255,45,123,0.3) 50%);
    z-index: 2;
  }

  .content {
    position: absolute;
    inset: 0;
    z-index: 3;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    padding: 0 14px 20px;
    gap: 8px;
  }

  .tagline {
    color: rgba(255,255,255,0.7);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .cta-btn {
    display: inline-block;
    padding: 10px 32px;
    background: linear-gradient(135deg, #FF2D7B 0%, #FF6B35 100%);
    color: #fff;
    font-size: 13px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    border-radius: 25px;
    box-shadow: 0 0 25px rgba(255,45,123,0.5), 0 4px 15px rgba(0,0,0,0.3);
  }
</style>
</head>
<body>

<div class="banner">
  <img src="{{THUMBNAIL_URL}}" alt="">
  <div class="border-overlay"></div>
  <div class="corner-accent"></div>
  <div class="content">
    <span class="tagline">Exclusive Content</span>
    <span class="cta-btn">Watch Me Now</span>
  </div>
</div>

</body>
</html>
