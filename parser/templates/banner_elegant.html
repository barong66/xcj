<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Banner — Elegant</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

  .banner {
    width: 300px;
    height: 250px;
    position: relative;
    overflow: hidden;
    background: #000;
    cursor: pointer;
  }

  .banner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 15%;
    display: block;
  }

  /* Heavy bottom gradient + vignette */
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.5) 100%),
      linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.6) 30%, rgba(0,0,0,0.15) 55%, transparent 70%);
    z-index: 1;
  }

  /* Blur zone — bottom half */
  .blur-zone {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 45%;
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    z-index: 1;
    mask-image: linear-gradient(to top, black 40%, transparent 100%);
    -webkit-mask-image: linear-gradient(to top, black 40%, transparent 100%);
  }

  .content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 20px;
  }

  /* Gold accent line */
  .gold-line {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #C9A96E, transparent);
    margin-bottom: 14px;
  }

  /* Diamond ornament */
  .ornament {
    width: 6px;
    height: 6px;
    background: #C9A96E;
    transform: rotate(45deg);
    margin-bottom: 12px;
    opacity: 0.7;
  }

  .username {
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: #fff;
    font-size: 17px;
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-shadow: 0 1px 6px rgba(0,0,0,0.6);
    margin-bottom: 8px;
  }

  .cta {
    font-family: 'Inter', sans-serif;
    color: #C9A96E;
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.8;
    transition: opacity 0.2s;
  }

  .banner:hover .cta {
    opacity: 1;
  }

  /* Thin top border accent */
  .top-accent {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 10%, rgba(201,169,110,0.4) 50%, transparent 90%);
    z-index: 2;
  }
</style>
</head>
<body>

<div class="banner">
  <img src="https://media.temptguide.com/thumbnails/instagram/3810203293960884706_lg.jpg" alt="">
  <div class="blur-zone"></div>
  <div class="top-accent"></div>
  <div class="content">
    <div class="ornament"></div>
    <div class="gold-line"></div>
    <span class="username">sofi.sun.s</span>
    <span class="cta">View Profile</span>
  </div>
</div>

</body>
</html>
